name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-safety:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dependency-free safety tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\run_tests.ps1
